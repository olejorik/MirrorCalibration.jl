name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
    branches:
      - main
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

# Enhanced permissions for security
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.8'
          - 'pre'
        os:
          - ubuntu-latest
        arch:
          - x64
        # Add Windows and macOS testing for main and PR branches
        include:
          - version: '1.11'
            os: windows-latest
            arch: x64
          - version: '1.11'  
            os: macOS-latest
            arch: x64
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history for better security analysis
          fetch-depth: 0
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - name: Build package
        uses: julia-actions/julia-buildpkg@v1
        timeout-minutes: 30
      - name: Run tests
        uses: julia-actions/julia-runtest@v1
        timeout-minutes: 45
        env:
          # Enable more strict testing
          JULIA_NUM_THREADS: 2
      - name: Process coverage
        uses: julia-actions/julia-processcoverage@v1
        if: matrix.version == '1.11' && matrix.os == 'ubuntu-latest'
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.version == '1.11' && matrix.os == 'ubuntu-latest'
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unittests
          name: codecov-umbrella

  # New job: Ensure all required checks pass before allowing merge
  merge-gate:
    name: Merge Requirements Check
    runs-on: ubuntu-latest
    needs: [test, docs]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      checks: read
      pull-requests: read
    steps:
      - name: Check required workflows
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { number: pull_number } = context.issue;
            
            // Get all check runs for this PR
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: context.payload.pull_request.head.sha,
              per_page: 100
            });
            
            // Required workflows that must pass
            const requiredChecks = [
              'Julia 1.11 - ubuntu-latest - x64',
              'Documentation'
            ];
            
            const failedChecks = [];
            const pendingChecks = [];
            
            for (const checkName of requiredChecks) {
              const check = checkRuns.check_runs.find(run => run.name === checkName);
              if (!check) {
                pendingChecks.push(checkName);
              } else if (check.conclusion !== 'success') {
                failedChecks.push(checkName);
              }
            }
            
            if (failedChecks.length > 0) {
              core.setFailed(`Required checks failed: ${failedChecks.join(', ')}`);
            } else if (pendingChecks.length > 0) {
              core.setFailed(`Required checks pending: ${pendingChecks.join(', ')}`);
            } else {
              core.info('All required checks passed ✅');
            }
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
      contents: write
      statuses: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
      - uses: julia-actions/cache@v2
      - name: Configure doc environment
        shell: julia --project=docs --color=yes {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()
        timeout-minutes: 15
      - name: Build package for docs
        uses: julia-actions/julia-buildpkg@v1
        timeout-minutes: 15
      - name: Deploy documentation
        uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        timeout-minutes: 15
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using MirrorCalibration
          DocMeta.setdocmeta!(MirrorCalibration, :DocTestSetup, :(using MirrorCalibration); recursive=true)
          doctest(MirrorCalibration)
        timeout-minutes: 10

  # New job: Security and compliance check for main branch pushes
  security-compliance:
    name: Security Compliance Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run security scan
        run: |
          echo "🔒 Security compliance check for main branch"
          
          # Check for sensitive files
          SENSITIVE_FILES=$(find . -name "*.key" -o -name "*.pem" -o -name "*.p12" -o -name "*.pfx" | grep -v ".git" || true)
          if [ -n "$SENSITIVE_FILES" ]; then
            echo "::error::Sensitive files detected: $SENSITIVE_FILES"
            exit 1
          fi
          
          # Check for hardcoded secrets patterns
          SECRET_PATTERNS=$(grep -r -i "password\s*=\|secret\s*=\|api[_-]?key\s*=\|token\s*=" --include="*.jl" . || true)
          if [ -n "$SECRET_PATTERNS" ]; then
            echo "::warning::Potential hardcoded secrets detected"
            echo "$SECRET_PATTERNS"
          fi
          
          echo "✅ Security compliance check passed"
