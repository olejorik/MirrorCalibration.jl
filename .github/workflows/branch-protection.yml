name: Branch Protection

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [ main ]

permissions:
  contents: read
  checks: read
  pull-requests: write
  statuses: write

jobs:
  enforce-protection:
    name: Enforce Branch Protection Rules
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check PR requirements
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const { number: pull_number } = context.issue;
          
          // Get PR details
          const { data: pr } = await github.rest.pulls.get({
            owner,
            repo,
            pull_number
          });
          
          console.log(`🔍 Checking PR #${pull_number}: ${pr.title}`);
          
          const issues = [];
          
          // 1. Check if PR has description
          if (!pr.body || pr.body.trim().length < 10) {
            issues.push("PR must have a meaningful description (at least 10 characters)");
          }
          
          // 2. Check if PR is from a fork (external contributor)
          const isExternal = pr.head.repo.full_name !== pr.base.repo.full_name;
          
          // 3. Check if there are any failing required status checks
          const { data: checks } = await github.rest.checks.listForRef({
            owner,
            repo,
            ref: pr.head.sha,
            per_page: 100
          });
          
          const requiredChecks = [
            'Julia 1.11 - ubuntu-latest - x64',
            'Code Quality Checks',
            'Validate Pull Request'
          ];
          
          const failingChecks = [];
          for (const checkName of requiredChecks) {
            const check = checks.check_runs.find(run => run.name === checkName);
            if (check && check.conclusion === 'failure') {
              failingChecks.push(checkName);
            }
          }
          
          if (failingChecks.length > 0) {
            issues.push(`Required checks are failing: ${failingChecks.join(', ')}`);
          }
          
          // 4. Check for merge conflicts
          if (pr.mergeable === false) {
            issues.push("PR has merge conflicts that must be resolved");
          }
          
          // 5. For external contributors, ensure review is requested
          if (isExternal) {
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number
            });
            
            const approvedReviews = reviews.filter(review => 
              review.state === 'APPROVED' && 
              review.user.type !== 'Bot'
            );
            
            if (approvedReviews.length === 0) {
              issues.push("External contributors require at least one approved review from a maintainer");
            }
          }
          
          // Report results
          if (issues.length > 0) {
            const message = `🚫 **Branch Protection Violations**\n\nThis PR cannot be merged due to the following issues:\n\n${issues.map(issue => `- ${issue}`).join('\n')}\n\nPlease address these issues before the PR can be merged.`;
            
            await github.rest.issues.createComment({
              issue_number: pull_number,
              owner,
              repo,
              body: message
            });
            
            core.setFailed(`Branch protection violations: ${issues.join('; ')}`);
          } else {
            console.log('✅ All branch protection requirements met');
          }

    - name: Check for direct pushes to main (should not happen with proper settings)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "::warning::Direct push to main branch detected"
        echo "This should be prevented by branch protection rules."
        echo "Please ensure branch protection is properly configured in repository settings."

  auto-merge-check:
    name: Auto-merge Eligibility Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    needs: enforce-protection

    steps:
    - name: Check auto-merge eligibility
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const { number: pull_number } = context.issue;
          
          // Get PR details
          const { data: pr } = await github.rest.pulls.get({
            owner,
            repo,
            pull_number
          });
          
          // Check if this is a dependabot PR
          const isDependabot = pr.user.login === 'dependabot[bot]';
          
          if (isDependabot) {
            // Get all check runs
            const { data: checks } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: pr.head.sha,
              per_page: 100
            });
            
            // Check if all required checks are passing
            const requiredChecks = [
              'Julia 1.11 - ubuntu-latest - x64',
              'Code Quality Checks'
            ];
            
            const allPassing = requiredChecks.every(checkName => {
              const check = checks.check_runs.find(run => run.name === checkName);
              return check && check.conclusion === 'success';
            });
            
            if (allPassing && pr.mergeable) {
              await github.rest.issues.createComment({
                issue_number: pull_number,
                owner,
                repo,
                body: '✅ This dependabot PR is eligible for auto-merge once all checks pass.'
              });
            }
          }

  prevent-force-push:
    name: Prevent Force Push Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Check for force push
      run: |
        if [ "${{ github.event.forced }}" = "true" ]; then
          echo "::error::Force push detected to main branch!"
          echo "Force pushes to main branch are not allowed."
          exit 1
        else
          echo "✅ Regular push detected, no force push"
        fi